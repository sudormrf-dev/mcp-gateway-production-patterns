name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy patterns/ --ignore-missing-imports

      - name: bandit security scan
        run: bandit -r patterns/ -ll

      - name: pytest
        run: pytest --cov=patterns --cov-report=term-missing --cov-fail-under=60 -v
